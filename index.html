<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEST-TCAE | OPE 2025</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="app.js" defer></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Test TCAE</h1>
            <p style="color: var(--color-text-muted);">Simulador de Examen OPE 2025</p>
        </header>
        
        <main>
            <div id="controls-section" class="controls">
                <div>
                    <label for="testSelector">Selecciona un test:</label>
                    <select id="testSelector">
                        <option value="">Cargando tests...</option>
                    </select>
                </div>

                <div class="timer-setup">
                    <label for="enableTimer">
                        <input type="checkbox" id="enableTimer" checked>
                        Temporizador:
                    </label>
                    <input type="number" id="timerMinutes" value="30" min="1" max="180" title="Minutos"> min
                </div>

                <button id="loadTestButton">Comenzar Test</button>
                <button id="viewHistoryButton" class="secondary-btn">Ver Historial</button>
                <button id="clearHistoryButton" class="secondary-btn" style="color: var(--color-danger); border-color: var(--color-danger);">Borrar Historial</button>
            </div>

            <div id="timer-display" class="timer-display">
                ⏱️ Tiempo restante: <span id="timeRemaining">00:00</span>
            </div>

            <div id="test-container" class="test-container">
                <!-- Las preguntas se renderizarán aquí dinámicamente -->
            </div>

            <div id="pagination-controls" class="pagination-controls" style="display: none;">
                <button id="prevBtn" class="secondary-btn">&laquo; Anterior</button>
                <span id="questionCounter" class="question-counter">-- / --</span>
                <button id="nextBtn">Siguiente &raquo;</button>
                <button id="submitTestBtn" style="display: none; background-color: var(--color-success);">Finalizar y Enviar</button>
            </div>

            <div id="results-area"></div>

            <div class="chart-container" id="chart-area" style="display: none;">
                <canvas id="resultsChart" class="results-chart"></canvas>
            </div>
        </main>
    </div>
</body>
</html>
